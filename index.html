<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澳門抽獎寶 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
    button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .prize-btn { border: 2px solid #e2e8f0; }
    .prize-btn:hover { border-color: #10b981; transform: scale(1.03); }
    .prize-btn.selected { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; }
    .modal-content { background: white; max-width: 480px; margin: 10% auto; border-radius: 24px; padding: 24px; }
    table { border-collapse: collapse; } th, td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; }
  </style>
</head>
<body class="bg-[#f8fafc] text-[#1e2937] min-h-screen pb-20">
  <div class="max-w-2xl mx-auto">

    <!-- 標題 -->
    <div class="bg-white border-b sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold text-emerald-700">抽獎寶</h1>
        <p class="text-sm text-slate-500">2026 • 記錄運氣 • 全澳運勢</p>
      </div>
      <div onclick="googleLogin()" id="loginBtn" class="cursor-pointer text-sm bg-white border border-slate-300 px-6 py-3 rounded-3xl flex items-center gap-2 shadow-sm">
        👤 <span id="userDisplay">登入</span>
      </div>
    </div>

    <!-- 隱私提示（登入區） -->
    <div class="px-6 py-3 bg-emerald-50 text-xs text-emerald-700 flex items-center gap-2">
      🔒 您的資料僅用於全澳抽獎統計分析，絕不作任何商業用途或外洩。
    </div>

    <!-- 底部導航 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t flex z-50">
      <button onclick="switchTab(0)" id="tab0" class="flex-1 py-4 border-b-2 border-emerald-600 text-emerald-600 font-semibold">快速記錄</button>
      <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4">我的戰績</button>
      <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4">全澳運勢</button>
    </div>

    <!-- Page 1: 快速記錄 -->
    <div id="page0" class="p-6">
      <div class="card rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-6">新增抽獎記錄</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-2">抽獎日期</label>
            <select id="dateSelect" class="w-full border border-slate-300 rounded-2xl px-5 py-5 text-lg"></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">支付系統</label>
            <select id="paymentSelect" class="w-full border border-slate-300 rounded-2xl px-5 py-5 text-lg"></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">抽獎面額（最多選3次）</label>
            <div id="selectionCounter" class="text-center font-semibold text-emerald-600 mb-3">已選 0 / 3 次機會</div>
            <div class="grid grid-cols-3 gap-4" id="prizeOptions"></div>
          </div>
        </div>
      </div>

      <button onclick="saveAndContribute()" id="mainBtn" 
              class="mt-10 w-full bg-[#10b981] hover:bg-[#059669] text-white py-6 rounded-3xl text-xl font-semibold shadow-lg">
        💾 儲存並貢獻到全澳運勢
      </button>

      <!-- 隱私提示（記錄區） -->
      <p class="text-center text-xs text-slate-500 mt-6">資料僅用於統計分析 • 匿名貢獻 • 保護您的隱私</p>
    </div>

    <!-- Page 2: 我的戰績 -->
    <div id="page1" class="p-6 hidden">
      <h2 class="text-2xl font-semibold mb-6">我的戰績</h2>
      <div id="myStats" class="grid grid-cols-3 gap-4"></div>
      <canvas id="myChart" class="mt-8"></canvas>

      <!-- 歷史記錄列表 -->
      <div class="mt-12">
        <h3 class="text-xl font-semibold mb-4">我的歷史記錄</h3>
        <div id="historyList" class="space-y-3"></div>
      </div>

      <div id="weeklyWarning" class="mt-6 bg-amber-50 border border-amber-200 rounded-2xl p-5 text-sm hidden"></div>
    </div>

    <!-- Page 3: 全澳運勢 -->
    <div id="page2" class="p-6 hidden">
      <h2 class="text-2xl font-semibold mb-6">全澳運勢</h2>
      
      <!-- 剩餘彩池卡片 -->
      <div id="remainingPool" class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white rounded-3xl p-6 mb-6 text-center"></div>
      
      <div id="totalSamples" class="bg-white rounded-3xl p-5 text-center mb-6 font-medium"></div>
      
      <!-- 數據可信度卡片 -->
      <div id="statReliability" class="bg-emerald-50 border border-emerald-200 rounded-3xl p-6 mb-6 text-sm"></div>
      
      <!-- 上限規則卡 -->
      <div id="upperLimits" class="bg-blue-50 border border-blue-200 rounded-3xl p-6 mb-6 text-sm"></div>
      
      <!-- 概率表格 + 圖表 -->
      <div id="probTable" class="bg-white rounded-3xl overflow-hidden"></div>
      <canvas id="probChart" class="mt-8"></canvas>

      <!-- 交叉表格 1: 周數 × 支付系統 -->
      <div class="mt-12">
        <h3 class="font-semibold mb-4">周數 × 支付系統 交叉統計</h3>
        <div id="crossPaymentTable" class="bg-white rounded-3xl overflow-auto"></div>
      </div>

      <!-- 交叉表格 2: 周數 × 中獎面額 -->
      <div class="mt-12">
        <h3 class="font-semibold mb-4">周數 × 中獎面額 交叉統計</h3>
        <div id="crossPrizeTable" class="bg-white rounded-3xl overflow-auto"></div>
      </div>
    </div>
  </div>

  <!-- 編輯 Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3 class="text-xl font-semibold mb-6">編輯抽獎記錄</h3>
      <div class="space-y-4">
        <select id="editDate" class="w-full border rounded-2xl px-5 py-4"></select>
        <select id="editPayment" class="w-full border rounded-2xl px-5 py-4"></select>
        <select id="editPrize" class="w-full border rounded-2xl px-5 py-4"></select>
      </div>
      <div class="flex gap-4 mt-8">
        <button onclick="hideEditModal()" class="flex-1 py-4 border border-slate-300 rounded-2xl">取消</button>
        <button onclick="saveEdit()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl">儲存修改</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t text-center text-xs text-slate-500 py-4">
    © 2026 澳門抽獎寶 All Rights Reserved.<br>
    隱私權聲明：本App僅收集匿名抽獎數據用於全澳統計分析，絕不作其他用途。
  </footer>

  <script>
    // ============== Firebase 配置 ==============
    const firebaseConfig = {
      apiKey: "AIzaSyDoTWA37Rhc3Fre-Y6uSOZIgfBLh9iDin4",
      authDomain: "macau-rewards-2026.firebaseapp.com",
      projectId: "macau-rewards-2026",
      storageBucket: "macau-rewards-2026.firebasestorage.app",
      messagingSenderId: "337797826758",
      appId: "1:337797826758:web:b5d549ce1e25846664afc7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let personalRecords = [];
    let crowdData = [];
    let selectedPrizes = [];
    let editingRecordId = null;

    const dates = ["2026-04-10 第1週 周五","2026-04-11 第1週 周六","2026-04-12 第1週 周日","2026-04-17 第2週 周五","2026-04-18 第2週 周六","2026-04-19 第2週 周日","2026-04-24 第3週 周五","2026-04-25 第3週 周六","2026-04-26 第3週 周日","2026-05-01 第4週 周五","2026-05-02 第4週 周六","2026-05-03 第4週 周日","2026-05-08 第5週 周五","2026-05-09 第5週 周六","2026-05-10 第5週 周日","2026-05-15 第6週 周五","2026-05-16 第6週 周六","2026-05-17 第6週 周日","2026-05-22 第7週 周五","2026-05-23 第7週 周六","2026-05-24 第7週 周日","2026-05-29 第8週 周五","2026-05-30 第8週 周六","2026-05-31 第8週 周日","2026-06-05 第9週 周五","2026-06-06 第9週 周六","2026-06-07 第9週 周日","2026-06-12 第10週 周五","2026-06-13 第10週 周六","2026-06-14 第10週 周日"];
    const payments = ["MPay澳門錢包","支付寶（澳門）","澳門中銀手機銀行","BOCPay","工銀e支付","豐付寶","廣發移動支付錢包","LusoPay","極易付澳門錢包/UePay"];
    const prizes = [0,10,20,50,100,200];
    const TOTAL_POOL = 400000000;
    const POPULATION = 688900;

    function getWeekNumber(dateStr) {
      const match = dateStr.match(/第(\d+)週/);
      return match ? parseInt(match[1]) : null;
    }

    function disableFutureDates() {
      const current = new Date('2026-04-04');
      const ds = document.getElementById('dateSelect');
      Array.from(ds.options).forEach(opt => {
        const datePart = opt.value.split(' ')[0];
        const optDate = new Date(datePart);
        if (optDate > current) {
          opt.disabled = true;
          opt.style.opacity = '0.5';
        }
      });
    }

    function calculatePoolStats() {
      if (crowdData.length === 0) return { disbursed: 0, remaining: TOTAL_POOL, winRate: 0 };
      let disbursed = 0, wins = 0;
      crowdData.forEach(r => {
        disbursed += r.prize || 0;
        if (r.prize > 0) wins++;
      });
      const winRate = ((wins / crowdData.length) * 100).toFixed(1);
      const remaining = TOTAL_POOL - disbursed;
      return { disbursed, remaining, winRate };
    }

    function getReliabilityMessage(count) {
      if (count < 385) return `目前樣本數較少（${count} 筆），數據僅供參考。<br><span class="text-rose-600">請繼續記錄並分享APP！</span>`;
      if (count < 1067) return `數據中等可信（${count} 筆）`;
      return `數據高可信度（${count} 筆），已具全澳代表性！`;
    }

    function init() {
      // 日期 + 支付系統 + 面額（同前）
      const ds = document.getElementById('dateSelect');
      dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; ds.appendChild(o); });
      disableFutureDates();

      const ps = document.getElementById('paymentSelect');
      payments.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; ps.appendChild(o); });

      const po = document.getElementById('prizeOptions');
      prizes.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'prize-btn border-2 border-slate-300 hover:border-emerald-600 active:scale-95 rounded-3xl py-8 text-2xl font-medium transition-all flex flex-col items-center justify-center';
        btn.innerHTML = p === 0 ? '未中獎<br><span class="text-xs">0元</span>' : p + '元';
        btn.dataset.prize = p;
        btn.onclick = () => togglePrize(btn);
        po.appendChild(btn);
      });

      loadCrowdData();
      switchTab(0);

      auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
          document.getElementById('userDisplay').textContent = user.displayName || "已登入";
          loadPersonalRecords();
        }
      });
    }

    // ...（googleLogin、togglePrize、saveAndContribute、loadPersonalRecords、loadCrowdData、renderMyStats、checkWeeklyLimits 同前，略過以節省篇幅）

    function renderCrowdProbability() {
      const stats = calculatePoolStats();
      const total = crowdData.length;

      // 剩餘彩池卡片
      document.getElementById('remainingPool').innerHTML = `
        <div class="text-2xl font-semibold">預估剩餘彩池金額</div>
        <div class="text-5xl font-bold mt-2">$${stats.remaining.toLocaleString()}</div>
        <div class="text-sm mt-2 opacity-90">（總彩池 4 億 • 基於 ${total} 筆樣本保守估計）</div>
      `;

      // 可信度
      document.getElementById('statReliability').innerHTML = `
        <strong class="text-emerald-700">數據可信度</strong><br>
        ${getReliabilityMessage(total)}
      `;

      // ...（原 probTable、圓餅圖保持）

      // 交叉表格 1: 周數 × 支付系統
      let paymentHTML = `<table class="w-full text-sm"><thead><tr><th>周數</th>`;
      payments.forEach(p => paymentHTML += `<th>${p.slice(0,6)}</th>`);
      paymentHTML += `</tr></thead><tbody>`;
      dates.forEach(d => {
        const week = getWeekNumber(d);
        paymentHTML += `<tr><td class="font-medium">${week}</td>`;
        payments.forEach(pay => {
          const cnt = crowdData.filter(r => getWeekNumber(r.date) === week && r.payment === pay).length;
          paymentHTML += `<td>${cnt}</td>`;
        });
        paymentHTML += `</tr>`;
      });
      paymentHTML += `</tbody></table>`;
      document.getElementById('crossPaymentTable').innerHTML = paymentHTML;

      // 交叉表格 2: 周數 × 中獎面額
      let prizeHTML = `<table class="w-full text-sm"><thead><tr><th>周數</th>`;
      [0,10,20,50,100,200].forEach(p => prizeHTML += `<th>${p===0?'未中':p}元</th>`);
      prizeHTML += `</tr></thead><tbody>`;
      dates.forEach(d => {
        const week = getWeekNumber(d);
        prizeHTML += `<tr><td class="font-medium">${week}</td>`;
        [0,10,20,50,100,200].forEach(pr => {
          const cnt = crowdData.filter(r => getWeekNumber(r.date) === week && r.prize === pr).length;
          prizeHTML += `<td>${cnt}</td>`;
        });
        prizeHTML += `</tr>`;
      });
      prizeHTML += `</tbody></table>`;
      document.getElementById('crossPrizeTable').innerHTML = prizeHTML;
    }

    // 編輯功能
    function renderHistoryList() {
      const container = document.getElementById('historyList');
      container.innerHTML = personalRecords.map(r => `
        <div class="bg-white rounded-3xl p-5 flex justify-between items-center">
          <div>
            <div class="font-medium">${r.date}</div>
            <div class="text-sm text-slate-500">${r.payment} • ${r.prize}元</div>
          </div>
          <button onclick="showEditModal('${r.id}')" class="px-5 py-2 text-emerald-600 border border-emerald-200 rounded-2xl">修改</button>
        </div>
      `).join('');
    }

    function showEditModal(id) {
      editingRecordId = id;
      const record = personalRecords.find(r => r.id === id);
      document.getElementById('editDate').value = record.date;
      document.getElementById('editPayment').value = record.payment;
      document.getElementById('editPrize').value = record.prize;
      document.getElementById('editModal').style.display = 'block';
    }

    function hideEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    async function saveEdit() {
      if (!editingRecordId) return;
      const newDate = document.getElementById('editDate').value;
      const newPayment = document.getElementById('editPayment').value;
      const newPrize = parseInt(document.getElementById('editPrize').value);

      await db.collection('personalRecords').doc(editingRecordId).update({
        date: newDate,
        payment: newPayment,
        prize: newPrize
      });

      hideEditModal();
      loadPersonalRecords();
      loadCrowdData();
      alert('✅ 已更新記錄');
    }

    function switchTab(n) {
      for (let i = 0; i < 3; i++) document.getElementById('page' + i).classList.add('hidden');
      document.getElementById('page' + n).classList.remove('hidden');
      if (n === 1) renderHistoryList();
    }

    window.onload = init;
  </script>
</body>
</html>
