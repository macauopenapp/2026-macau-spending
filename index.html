<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026澳門消費大獎賞 記帳監督器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen pb-20">
  <div class="max-w-2xl mx-auto">

    <!-- 標題 -->
    <div class="bg-white border-b sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-semibold text-slate-900">消費大獎賞監督器</h1>
        <p class="text-xs text-slate-500">2026 • 雲端記錄 + 全澳概率</p>
      </div>
      <div onclick="googleLogin()" id="loginBtn" class="cursor-pointer text-sm bg-white border border-slate-300 px-5 py-2 rounded-3xl flex items-center gap-2">
        👤 <span id="userDisplay">登入</span>
      </div>
    </div>

    <!-- 底部導航 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t flex z-50">
      <button onclick="switchTab(0)" id="tab0" class="flex-1 py-4 border-b-2 border-sky-600 text-sky-600 font-medium">記錄</button>
      <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4">我的統計</button>
      <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4">全澳概率</button>
    </div>

    <!-- Page 1: 記錄 -->
    <div id="page0" class="p-6">
      <div class="card rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-6">新增抽獎記錄</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">抽獎日期</label>
            <select id="dateSelect" class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-base"></select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">支付系統</label>
            <select id="paymentSelect" class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-base"></select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">抽獎面額（可多選）</label>
            <div class="grid grid-cols-3 gap-3" id="prizeOptions"></div>
          </div>
        </div>
      </div>

      <button onclick="saveToMyAccount()" class="mt-8 w-full bg-sky-600 text-white py-5 rounded-3xl text-lg font-semibold">💾 儲存到我的帳戶（雲端同步）</button>
      <button onclick="uploadToSheet()" class="mt-3 w-full bg-emerald-600 text-white py-5 rounded-3xl text-lg font-semibold" id="uploadBtn">☁️ 貢獻到全澳統計</button>
    </div>

    <!-- Page 2: 我的統計 -->
    <div id="page1" class="p-6 hidden">
      <h2 class="text-xl font-semibold mb-6">我的統計</h2>
      <div id="myStats" class="grid grid-cols-3 gap-4"></div>
      <canvas id="myChart" class="mt-8"></canvas>
      <div id="weeklyWarning" class="mt-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 text-sm hidden"></div>
    </div>

    <!-- Page 3: 全澳概率 -->
    <div id="page2" class="p-6 hidden">
      <h2 class="text-xl font-semibold mb-6">全澳概率統計</h2>
      <div id="totalSamples" class="bg-white rounded-3xl p-5 text-center mb-6 font-medium"></div>
      <div id="probTable" class="bg-white rounded-3xl overflow-hidden"></div>
      <canvas id="probChart" class="mt-8"></canvas>
    </div>
  </div>

  <script>
    // ============== Firebase 配置 ==============
    const firebaseConfig = {
      apiKey: "AIzaSyDoTWA37Rhc3Fre-Y6uSOZIgfBLh9iDin4",
      authDomain: "macau-rewards-2026.firebaseapp.com",
      projectId: "macau-rewards-2026",
      storageBucket: "macau-rewards-2026.firebasestorage.app",
      messagingSenderId: "337797826758",
      appId: "1:337797826758:web:b5d549ce1e25846664afc7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CSV_URL = "https://docs.google.com/spreadsheets/d/1RkTNjEyGSry_IL0jC344dBqoXOZoLH7aCWaVeWym3Fk/export?format=csv&gid=0";
    const UPLOAD_URL = "https://script.google.com/macros/s/AKfycbxP2Acck5jB6Kd6DKhI5cGtaL-fHlDqK_nYKhMOHAaWvo0ZxuQ4RlBX6vRV3OQ4QL8LBw/exec";

    let currentUser = null;
    let personalRecords = [];
    let crowdData = [];

    const dates = ["2026-04-10 第1週 周五","2026-04-11 第1週 周六","2026-04-12 第1週 周日","2026-04-17 第2週 周五","2026-04-18 第2週 周六","2026-04-19 第2週 周日","2026-04-24 第3週 周五","2026-04-25 第3週 周六","2026-04-26 第3週 周日","2026-05-01 第4週 周五","2026-05-02 第4週 周六","2026-05-03 第4週 周日","2026-05-08 第5週 周五","2026-05-09 第5週 周六","2026-05-10 第5週 周日","2026-05-15 第6週 周五","2026-05-16 第6週 周六","2026-05-17 第6週 周日","2026-05-22 第7週 周五","2026-05-23 第7週 周六","2026-05-24 第7週 周日","2026-05-29 第8週 周五","2026-05-30 第8週 周六","2026-05-31 第8週 周日","2026-06-05 第9週 周五","2026-06-06 第9週 周六","2026-06-07 第9週 周日","2026-06-12 第10週 周五","2026-06-13 第10週 周六","2026-06-14 第10週 周日"];
    const payments = ["MPay澳門錢包","支付寶（澳門）","澳門中銀手機銀行","工銀e支付","豐付寶","廣發移動支付錢包","LusoPay","極易付澳門錢包/UePay"];
    const prizes = [0,10,20,50,100,200];

    function init() {
      // 初始化選單
      const ds = document.getElementById('dateSelect');
      dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; ds.appendChild(o); });
      const ps = document.getElementById('paymentSelect');
      payments.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; ps.appendChild(o); });
      const po = document.getElementById('prizeOptions');
      prizes.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'border border-slate-300 hover:border-slate-500 rounded-2xl py-6 text-xl font-medium transition-all active:scale-95';
        btn.textContent = p + '元';
        btn.onclick = () => btn.classList.toggle('border-sky-500');
        po.appendChild(btn);
      });

      loadCrowdData();
      switchTab(0);

      auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
          document.getElementById('userDisplay').textContent = user.displayName || "已登入";
          loadPersonalRecords();
        }
      });
    }

    async function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) { alert('登入失敗：' + e.message); }
    }

    // ================== 儲存到我的帳戶 ==================
    async function saveToMyAccount() {
      if (!currentUser) return alert('請先登入 Google 帳戶');
      const date = document.getElementById('dateSelect').value;
      const payment = document.getElementById('paymentSelect').value;
      const selected = Array.from(document.querySelectorAll('#prizeOptions button.border-sky-500')).map(b => parseInt(b.textContent));
      if (selected.length === 0) return alert('請至少選擇一個面額');

      try {
        for (let prize of selected) {
          await db.collection('personalRecords').add({
            uid: currentUser.uid,
            date, payment, prize,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
        loadPersonalRecords();
        alert('✅ 已成功儲存到雲端！');
      } catch (e) { alert('儲存失敗：' + e.message); }
    }

    async function loadPersonalRecords() {
      if (!currentUser) return;
      const snapshot = await db.collection('personalRecords').where('uid', '==', currentUser.uid).get();
      personalRecords = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderMyStats();
    }

    function renderMyStats() {
      const container = document.getElementById('myStats');
      if (personalRecords.length === 0) {
        container.innerHTML = `<p class="col-span-3 text-center py-12 text-slate-400">還沒有記錄</p>`;
        return;
      }
      // KPI 卡片
      const total = personalRecords.length;
      const totalPrize = personalRecords.reduce((sum, r) => sum + r.prize, 0);
      const winRate = ((personalRecords.filter(r => r.prize > 0).length / total) * 100).toFixed(1);
      container.innerHTML = `
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-sky-600">${total}</div><div class="text-xs text-slate-500">總抽獎次數</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-emerald-600">$${totalPrize}</div><div class="text-xs text-slate-500">總中獎金額</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-amber-600">${winRate}%</div><div class="text-xs text-slate-500">整體中獎率</div></div>
      `;
      // 圖表
      new Chart(document.getElementById('myChart'), {
        type: 'bar',
        data: { labels: prizes, datasets: [{ label: '面額分佈', data: prizes.map(p => personalRecords.filter(r => r.prize === p).length), backgroundColor: '#0ea5e9' }] }
      });
    }

    // ================== 全澳概率 ==================
    function renderCrowdProbability() {
      const sampleDiv = document.getElementById('totalSamples');
      const tableDiv = document.getElementById('probTable');
      if (crowdData.length === 0) return;
      sampleDiv.textContent = `全澳總樣本數：${crowdData.length} 筆`;
      let html = `<table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-3">週數</th><th class="p-3">總次數</th>`;
      prizes.forEach(p => html += `<th class="p-3">${p}元 (%)</th>`);
      html += `</tr></thead><tbody>`;
      for (let w = 1; w <= 10; w++) {
        const weekData = crowdData.filter(r => r.抽獎日期 && r.抽獎日期.includes(`第${w}週`));
        if (weekData.length === 0) continue;
        const total = weekData.length;
        let row = `<tr class="border-b"><td class="p-3 font-medium">第${w}週</td><td class="p-3 text-center">${total}</td>`;
        prizes.forEach(p => {
          const count = weekData.filter(r => parseInt(r.抽獎面額) === p).length;
          const percent = (count / total * 100).toFixed(1);
          row += `<td class="p-3 text-center">${count} <span class="text-xs text-slate-400">(${percent}%)</span></td>`;
        });
        html += row + '</tr>';
      }
      html += '</tbody></table>';
      tableDiv.innerHTML = html;
    }

    async function loadCrowdData() {
      Papa.parse(CSV_URL, {download: true, header: true, complete: (res) => {
        crowdData = res.data.filter(r => r.抽獎日期);
        renderCrowdProbability();
      }});
    }

    async function uploadToSheet() {
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true; btn.textContent = '上傳中...';
      const date = document.getElementById('dateSelect').value;
      const payment = document.getElementById('paymentSelect').value;
      const selected = Array.from(document.querySelectorAll('#prizeOptions button.border-sky-500')).map(b => parseInt(b.textContent));
      if (selected.length === 0) { alert('請至少選擇一個面額'); btn.disabled = false; btn.textContent = '☁️ 貢獻到全澳統計'; return; }

      try {
        const promises = selected.map(prize => fetch(UPLOAD_URL, {method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({date, payment, prize})}));
        await Promise.all(promises);
        alert('✅ 已成功貢獻到全澳統計！');
        loadCrowdData();
      } catch (e) { alert('錯誤：' + e.message); } finally {
        btn.disabled = false; btn.textContent = '☁️ 貢獻到全澳統計';
      }
    }

    function switchTab(n) {
      for (let i = 0; i < 3; i++) document.getElementById('page' + i).classList.add('hidden');
      document.getElementById('page' + n).classList.remove('hidden');
    }

    window.onload = init;
  </script>
</body>
</html>
