<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026澳門消費大獎賞 記帳監督器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md p-6">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">2026澳門消費大獎賞 記帳監督器</h1>

        <!-- 提示訊息 Toast -->
        <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300 pointer-events-none z-50 opacity-0">
            提示訊息
        </div>

        <!-- 模擬的表單區塊 -->
        <div class="mb-6">
            <h2 class="text-lg font-semibold mb-2 border-b pb-2">新增抽獎記錄</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">抽獎週數</label>
                    <select id="weekSelect" class="w-full border-gray-300 rounded-md shadow-sm p-2 border">
                        <option value="第 1 週">第 1 週</option>
                        <option value="第 2 週">第 2 週</option>
                        <option value="第 3 週">第 3 週</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">支付系統</label>
                    <select id="paymentSelect" class="w-full border-gray-300 rounded-md shadow-sm p-2 border">
                        <option value="MPay澳門錢包">MPay澳門錢包</option>
                        <option value="支付寶(澳門)">支付寶(澳門)</option>
                        <option value="澳門中銀手機銀行">澳門中銀手機銀行</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">抽獎面額 (元)</label>
                <input type="number" id="amountInput" class="w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="請輸入抽中金額" value="10">
            </div>

            <div class="flex gap-4">
                <button onclick="saveRecord(false)" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded transition">
                    💾 只存手機
                </button>
                <!-- 這裡綁定 saveRecord(true) 代表要上傳雲端 -->
                <button onclick="saveRecord(true)" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition">
                    ☁️ 上傳到全澳統計
                </button>
            </div>
        </div>

        <!-- 統計區塊 -->
        <div class="bg-gray-50 p-4 rounded-lg border">
            <h2 class="text-lg font-semibold mb-2">我的統計</h2>
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="bg-white p-2 rounded shadow-sm">
                    <div class="text-sm text-gray-500">總抽獎次數</div>
                    <div class="text-xl font-bold text-blue-600" id="totalCount">0</div>
                </div>
                <div class="bg-white p-2 rounded shadow-sm">
                    <div class="text-sm text-gray-500">總中獎金額</div>
                    <div class="text-xl font-bold text-green-600" id="totalAmount">0</div>
                </div>
                <div class="bg-white p-2 rounded shadow-sm">
                    <div class="text-sm text-gray-500">中獎率</div>
                    <div class="text-xl font-bold text-purple-600" id="winRate">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 請在這裡填入你最新的 Google Apps Script Web App URL
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/你的部署ID/exec"; 

        // 顯示提示訊息的函數
        function showToast(message, type = "info") {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.style.opacity = "1";
            
            if (type === "success") toast.style.backgroundColor = "#10b981"; // 綠色
            else if (type === "error") toast.style.backgroundColor = "#ef4444"; // 紅色
            else toast.style.backgroundColor = "#1e293b"; // 深灰

            setTimeout(() => {
                toast.style.opacity = "0";
            }, 3000);
        }

        // 儲存記錄的函數 (這就是你報錯的源頭，現在已經修復)
        function saveRecord(uploadToCloudFlag) {
            // 1. 收集畫面上的資料
            const week = document.getElementById("weekSelect").value;
            const payment = document.getElementById("paymentSelect").value;
            const amount = document.getElementById("amountInput").value;

            if (!amount) {
                showToast("請輸入面額", "error");
                return;
            }

            // 2. 打包成物件 (這就是 dataToUpload)
            const dataToUpload = {
                week: week,
                payment: payment,
                amount: Number(amount),
                timestamp: new Date().toISOString()
            };

            // 3. 判斷是否要上傳到雲端
            if (uploadToCloudFlag) {
                // ✅ 關鍵修復：這裡把 dataToUpload 傳進去給 uploadToCloud 函數！
                uploadToCloud(dataToUpload); 
            } else {
                showToast("已儲存至手機本地", "success");
                // 這裡可以加上你原本存到 localStorage 的邏輯
            }
        }

        // 上傳到 Google Sheet 的函數
        // ✅ 關鍵修復：這裡的括號接收了 dataToUpload 變數
        function uploadToCloud(dataToUpload) {
            showToast("上傳中...", "info");

            fetch(GAS_WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(dataToUpload), // 現在這裡找得到變數了，不會再報錯！
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("網路回應錯誤狀態碼: " + response.status);
                }
                return response.json(); 
            })
            .then(data => {
                if (data.status === "success") {
                    showToast("上傳成功！感謝貢獻數據。", "success");
                } else {
                    showToast("上傳失敗：" + data.message, "error");
                    console.error("GAS 內部錯誤:", data.message);
                }
            })
            .catch(error => {
                showToast("上傳失敗，請檢查網路或控制台日誌", "error");
                console.error("Fetch 請求失敗:", error);
            });
        }
    </script>
</body>
</html>
