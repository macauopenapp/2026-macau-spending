<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026澳門消費大獎賞 記帳監督器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
    button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-[#f8fafc] text-[#1e2937] min-h-screen pb-20">
  <div class="max-w-2xl mx-auto">

    <!-- 標題 -->
    <div class="bg-white border-b sticky top-0 z-50 px-6 py-5 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-semibold text-slate-900">消費大獎賞監督器</h1>
        <p class="text-sm text-slate-500">2026 • 雲端記錄 + 全澳概率</p>
      </div>
      <div onclick="googleLogin()" id="loginBtn" class="cursor-pointer text-sm bg-white border border-slate-300 px-6 py-3 rounded-3xl flex items-center gap-2 shadow-sm">
        👤 <span id="userDisplay">登入</span>
      </div>
    </div>

    <!-- 底部導航 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t flex z-50">
      <button onclick="switchTab(0)" id="tab0" class="flex-1 py-4 border-b-2 border-[#0ea5e9] text-[#0ea5e9] font-semibold">記錄</button>
      <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4">我的統計</button>
      <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4">全澳概率</button>
    </div>

    <!-- Page 1: 記錄 -->
    <div id="page0" class="p-6">
      <div class="card rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-6">新增抽獎記錄</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-sm font-medium mb-2">抽獎日期</label>
            <select id="dateSelect" class="w-full border border-slate-300 rounded-2xl px-5 py-5 text-lg"></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">支付系統</label>
            <select id="paymentSelect" class="w-full border border-slate-300 rounded-2xl px-5 py-5 text-lg"></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">抽獎面額（可多選）</label>
            <div class="grid grid-cols-3 gap-4" id="prizeOptions"></div>
          </div>
        </div>
      </div>

      <button onclick="saveAndContribute()" id="mainBtn" 
              class="mt-10 w-full bg-[#10b981] hover:bg-[#059669] text-white py-6 rounded-3xl text-xl font-semibold shadow-lg">
        💾 儲存並貢獻到全澳統計
      </button>
    </div>

    <!-- Page 2: 我的統計 -->
    <div id="page1" class="p-6 hidden">
      <h2 class="text-2xl font-semibold mb-6">我的統計</h2>
      <div id="myStats" class="grid grid-cols-3 gap-4"></div>
      <canvas id="myChart" class="mt-8"></canvas>
      <div id="weeklyWarning" class="mt-6 bg-amber-50 border border-amber-200 rounded-2xl p-5 text-sm hidden"></div>
    </div>

    <!-- Page 3: 全澳概率 -->
    <div id="page2" class="p-6 hidden">
      <h2 class="text-2xl font-semibold mb-6">全澳概率統計</h2>
      <div id="totalSamples" class="bg-white rounded-3xl p-5 text-center mb-6 font-medium"></div>
      
      <!-- 新增：抽獎機會上限參考卡（根據最新規則） -->
      <div id="upperLimits" class="bg-blue-50 border border-blue-200 rounded-3xl p-6 mb-6 text-sm"></div>
      
      <div id="probTable" class="bg-white rounded-3xl overflow-hidden"></div>
      <canvas id="probChart" class="mt-8"></canvas>
    </div>
  </div>

  <script>
    // ============== Firebase 配置 ==============
    const firebaseConfig = {
      apiKey: "AIzaSyDoTWA37Rhc3Fre-Y6uSOZIgfBLh9iDin4",
      authDomain: "macau-rewards-2026.firebaseapp.com",
      projectId: "macau-rewards-2026",
      storageBucket: "macau-rewards-2026.firebasestorage.app",
      messagingSenderId: "337797826758",
      appId: "1:337797826758:web:b5d549ce1e25846664afc7"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let personalRecords = [];
    let crowdData = [];

    const dates = ["2026-04-10 第1週 周五","2026-04-11 第1週 周六","2026-04-12 第1週 周日","2026-04-17 第2週 周五","2026-04-18 第2週 周六","2026-04-19 第2週 周日","2026-04-24 第3週 周五","2026-04-25 第3週 周六","2026-04-26 第3週 周日","2026-05-01 第4週 周五","2026-05-02 第4週 周六","2026-05-03 第4週 周日","2026-05-08 第5週 周五","2026-05-09 第5週 周六","2026-05-10 第5週 周日","2026-05-15 第6週 周五","2026-05-16 第6週 周六","2026-05-17 第6週 周日","2026-05-22 第7週 周五","2026-05-23 第7週 周六","2026-05-24 第7週 周日","2026-05-29 第8週 周五","2026-05-30 第8週 周六","2026-05-31 第8週 周日","2026-06-05 第9週 周五","2026-06-06 第9週 周六","2026-06-07 第9週 周日","2026-06-12 第10週 周五","2026-06-13 第10週 周六","2026-06-14 第10週 周日"];
    const payments = ["MPay澳門錢包","支付寶（澳門）","澳門中銀手機銀行","BOCPay","工銀e支付","豐付寶","廣發移動支付錢包","LusoPay","極易付澳門錢包/UePay"];
    const prizes = [0,10,20,50,100,200];

    function getWeekNumber(dateStr) {
      const match = dateStr.match(/第(\d+)週/);
      return match ? parseInt(match[1]) : null;
    }

    function checkWeeklyLimits() {
      const weekly = {};
      personalRecords.forEach(r => {
        const week = getWeekNumber(r.date);
        const key = `${week}-${r.payment}`;
        if (!weekly[key]) weekly[key] = 0;
        weekly[key]++;
      });
      let warnings = [];
      Object.keys(weekly).forEach(k => {
        if (weekly[k] > 3) {
          const [week, pay] = k.split('-');
          warnings.push(`${pay} 第${week}週已記錄 ${weekly[k]}次（規則上限3次）`);
        }
      });
      const warnDiv = document.getElementById('weeklyWarning');
      if (warnings.length > 0) {
        warnDiv.classList.remove('hidden');
        warnDiv.innerHTML = `⚠️ <strong>每週上限提醒：</strong><br>` + warnings.join('<br>');
      } else {
        warnDiv.classList.add('hidden');
      }
    }

    function init() {
      const ds = document.getElementById('dateSelect');
      dates.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d;
        ds.appendChild(o);
      });

      const ps = document.getElementById('paymentSelect');
      payments.forEach(p => {
        const o = document.createElement('option');
        o.value = p; o.textContent = p;
        ps.appendChild(o);
      });

      const po = document.getElementById('prizeOptions');
      prizes.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'border-2 border-slate-300 hover:border-sky-600 active:scale-95 rounded-3xl py-7 text-2xl font-medium transition-all ' + (p === 0 ? 'border-rose-300 text-rose-600' : '');
        btn.textContent = p === 0 ? '未中獎' : p + '元';
        btn.onclick = () => btn.classList.toggle('border-sky-600');
        po.appendChild(btn);
      });

      loadCrowdData();
      switchTab(0);

      auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
          document.getElementById('userDisplay').textContent = user.displayName || "已登入";
          loadPersonalRecords();
        }
      });
    }

    async function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (e) { alert('登入失敗：' + e.message); }
    }

    async function saveAndContribute() {
      if (!currentUser) return alert('請先登入 Google 帳戶');
      const date = document.getElementById('dateSelect').value;
      const payment = document.getElementById('paymentSelect').value;
      const selected = Array.from(document.querySelectorAll('#prizeOptions button.border-sky-600')).map(b => parseInt(b.textContent.replace('未中獎','0')));
      if (selected.length === 0) return alert('請至少選擇一個面額');
      if (selected.length > 3) return alert('⚠️ 一筆消費最多3次抽獎機會（規則限制）');

      const week = getWeekNumber(date);
      const currentWeekCount = personalRecords.filter(r => getWeekNumber(r.date) === week && r.payment === payment).length;
      if (currentWeekCount + selected.length > 3) {
        return alert(`⚠️ ${payment} 本週已使用 ${currentWeekCount} 次！\n每週每支付系統上限僅3次，請使用其他錢包。`);
      }

      const btn = document.getElementById('mainBtn');
      btn.disabled = true;
      btn.textContent = '儲存中...';

      try {
        for (let prize of selected) {
          await db.collection('personalRecords').add({ uid: currentUser.uid, date, payment, prize, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
          await db.collection('crowdRecords').add({ date, payment, prize, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }
        loadPersonalRecords();
        loadCrowdData();
        alert('✅ 已成功儲存並貢獻到全澳統計！');
      } catch (e) { alert('儲存失敗：' + e.message); } finally {
        btn.disabled = false;
        btn.textContent = '💾 儲存並貢獻到全澳統計';
      }
    }

    async function loadPersonalRecords() {
      if (!currentUser) return;
      const snapshot = await db.collection('personalRecords').where('uid', '==', currentUser.uid).get();
      personalRecords = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderMyStats();
    }

    async function loadCrowdData() {
      const snapshot = await db.collection('crowdRecords').get();
      crowdData = snapshot.docs.map(doc => doc.data());
      renderCrowdProbability();
    }

    function renderMyStats() {
      const container = document.getElementById('myStats');
      if (personalRecords.length === 0) {
        container.innerHTML = `<p class="col-span-3 text-center py-12 text-slate-400">還沒有記錄</p>`;
        return;
      }
      const total = personalRecords.length;
      const totalPrize = personalRecords.reduce((sum, r) => sum + r.prize, 0);
      const winRate = ((personalRecords.filter(r => r.prize > 0).length / total) * 100).toFixed(1);

      container.innerHTML = `
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-sky-600">${total}</div><div class="text-xs text-slate-500">總抽獎次數</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-emerald-600">$${totalPrize}</div><div class="text-xs text-slate-500">總中獎金額</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-amber-600">${winRate}%</div><div class="text-xs text-slate-500">整體中獎率</div></div>
      `;
      new Chart(document.getElementById('myChart'), { type: 'bar', data: { labels: prizes, datasets: [{ label: '面額分佈', data: prizes.map(p => personalRecords.filter(r => r.prize === p).length), backgroundColor: '#0ea5e9' }] } });

      checkWeeklyLimits();
    }

    function renderCrowdProbability() {
      const sampleDiv = document.getElementById('totalSamples');
      const tableDiv = document.getElementById('probTable');
      const upperDiv = document.getElementById('upperLimits');
      if (crowdData.length === 0) {
        sampleDiv.innerHTML = `<span class="text-slate-400">等待全澳用戶貢獻抽獎記錄...</span>`;
        tableDiv.innerHTML = '';
        upperDiv.innerHTML = '';
        return;
      }

      const total = crowdData.length;
      const prizeCount = {0:0,10:0,20:0,50:0,100:0,200:0};
      let totalPrizeAmount = 0;
      let wins = 0;

      crowdData.forEach(r => {
        const p = r.prize || 0;
        if (prizeCount.hasOwnProperty(p)) prizeCount[p]++;
        totalPrizeAmount += p;
        if (p > 0) wins++;
      });

      const avgPrize = (totalPrizeAmount / total).toFixed(1);
      const winRate = ((wins / total) * 100).toFixed(1);

      sampleDiv.innerHTML = `
        全澳總樣本數：<span class="text-3xl font-bold text-emerald-600">${total}</span> 筆<br>
        <span class="text-sm text-slate-500">整體中獎率 ${winRate}% • 平均每抽 $${avgPrize}</span>
      `;

      // 上限規則卡
      upperDiv.innerHTML = `
        <div class="flex items-start gap-3">
          <span class="text-2xl">📌</span>
          <div>
            <strong class="text-blue-700">抽獎機會上限（最新規則）</strong><br>
            • 每支付系統每週最多 <strong class="text-blue-600">3次</strong>（首筆滿50元消費觸發）<br>
            • 9個錢包最多 <strong class="text-blue-600">27次/週</strong><br>
            • 僅限週五至週日（每日無獨立硬上限）<br>
            <span class="text-xs text-blue-600">目前樣本已收集 ${total} 次 • 數據品質高（符合規則）</span>
          </div>
        </div>
      `;

      // 面額概率表格 + 支付系統比較表
      let html = `<div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-slate-50"><tr><th class="px-6 py-3 text-left">面額</th><th class="px-6 py-3 text-center">次數</th><th class="px-6 py-3 text-center">概率</th></tr></thead><tbody class="divide-y">`;
      [0,10,20,50,100,200].forEach(p => {
        const count = prizeCount[p];
        const prob = ((count / total) * 100).toFixed(2);
        const label = p === 0 ? '未中獎' : p + '元';
        html += `<tr><td class="px-6 py-4 font-medium">${label}</td><td class="px-6 py-4 text-center font-semibold">${count}</td><td class="px-6 py-4 text-center font-semibold">${prob}%</td></tr>`;
      });
      html += `</tbody></table></div>`;

      const paymentStats = {};
      payments.forEach(p => paymentStats[p] = {count:0, prizeSum:0, wins:0});
      crowdData.forEach(r => {
        if (paymentStats[r.payment]) {
          paymentStats[r.payment].count++;
          paymentStats[r.payment].prizeSum += r.prize;
          if (r.prize > 0) paymentStats[r.payment].wins++;
        }
      });
      html += `<div class="mt-8"><h3 class="font-semibold mb-3">各支付系統表現比較</h3><div class="grid grid-cols-2 gap-3">`;
      Object.keys(paymentStats).forEach(pay => {
        const s = paymentStats[pay];
        if (s.count === 0) return;
        const avg = (s.prizeSum / s.count).toFixed(1);
        const winR = ((s.wins / s.count) * 100).toFixed(1);
        html += `<div class="bg-white border rounded-2xl p-4"><div class="font-medium">${pay}</div><div class="text-xs text-slate-500">${s.count} 筆</div><div class="mt-2 text-right"><span class="font-semibold text-emerald-600">${winR}%</span> 中獎 • 平均 $${avg}</div></div>`;
      });
      html += `</div></div>`;

      tableDiv.innerHTML = html;

      // 圓餅圖
      const ctx = document.getElementById('probChart');
      if (window.myProbChart) window.myProbChart.destroy();
      window.myProbChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['未中獎','10元','20元','50元','100元','200元'],
          datasets: [{ data: Object.values(prizeCount), backgroundColor: ['#64748b','#22c55e','#eab308','#3b82f6','#a855f7','#ec4899'] }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
      });
    }

    function switchTab(n) {
      for (let i = 0; i < 3; i++) document.getElementById('page' + i).classList.add('hidden');
      document.getElementById('page' + n).classList.remove('hidden');
    }

    window.onload = init;
  </script>
</body>
</html>
