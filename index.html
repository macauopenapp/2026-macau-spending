<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026澳門消費大獎賞 記帳監督器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen pb-20">
  <div class="max-w-2xl mx-auto">

    <!-- 標題 -->
    <div class="bg-white border-b sticky top-0 z-50 px-6 py-5">
      <h1 class="text-2xl font-semibold text-slate-900">消費大獎賞監督器</h1>
      <p class="text-xs text-slate-500">2026 • 一站式記錄 + 全澳概率</p>
    </div>

  <!-- 登入 Modal（已優化：只需輸入8位） -->
<div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
  <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4">
    <h3 class="text-2xl font-semibold mb-6">澳門電話登入</h3>
    
    <div id="phoneStep">
      <label class="block text-sm text-slate-500 mb-1">澳門電話號碼（8位數字）</label>
      <input id="phoneInput" type="tel" maxlength="8" placeholder="65341234" 
             class="w-full border border-slate-300 rounded-2xl px-5 py-4 text-lg text-center font-mono">
      <p class="text-xs text-slate-400 mt-2">系統會自動加上 +853 區號，無需手動輸入</p>
      <button onclick="sendVerificationCode()" class="mt-6 w-full bg-sky-600 hover:bg-sky-700 text-white py-4 rounded-3xl text-lg font-medium">發送驗證碼</button>
    </div>
    
    <div id="codeStep" class="hidden">
      <label class="block text-sm text-slate-500 mb-2">6位驗證碼</label>
      <input id="codeInput" type="text" maxlength="6" class="w-full border border-slate-300 rounded-2xl px-5 py-4 text-lg text-center tracking-[0.5em]">
      <button onclick="verifyCode()" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-3xl text-lg font-medium">確認登入</button>
    </div>
    
    <div id="recaptcha-container" class="hidden"></div>
    
    <button onclick="closeModal()" class="mt-6 text-slate-400 hover:text-slate-600 block mx-auto">取消</button>
  </div>
</div>

    <!-- 底部導航 -->
    <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white border-t flex z-50">
      <button onclick="switchTab(0)" id="tab0" class="flex-1 py-4 border-b-2 border-sky-600 text-sky-600 font-medium">記錄</button>
      <button onclick="switchTab(1)" id="tab1" class="flex-1 py-4">我的統計</button>
      <button onclick="switchTab(2)" id="tab2" class="flex-1 py-4">全澳概率</button>
    </div>

    <!-- Page 1: 記錄 -->
    <div id="page0" class="p-6">
      <div class="card rounded-3xl p-6">
        <h2 class="text-xl font-semibold mb-6">新增抽獎記錄</h2>
        <div class="space-y-6">
          <!-- 原有日期、支付、面額選項保持不變 -->
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">抽獎日期</label>
            <select id="dateSelect" class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-base"></select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-1">支付系統</label>
            <select id="paymentSelect" class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-base"></select>
          </div>
          <div>
            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">抽獎面額（可多選）</label>
            <div class="grid grid-cols-3 gap-3" id="prizeOptions"></div>
          </div>
        </div>
      </div>

      <button onclick="saveToMyAccount()" class="mt-8 w-full bg-sky-600 text-white py-5 rounded-3xl text-lg font-semibold">💾 儲存到我的帳戶（雲端同步）</button>
      <button onclick="uploadToSheet()" class="mt-3 w-full bg-emerald-600 text-white py-5 rounded-3xl text-lg font-semibold" id="uploadBtn">☁️ 上傳到全澳統計</button>
    </div>

    <!-- Page 2: 我的統計 -->
    <div id="page1" class="p-6 hidden">
      <h2 class="text-xl font-semibold mb-6">我的統計</h2>
      <div id="myStats" class="grid grid-cols-3 gap-4"></div>
      <canvas id="myChart" class="mt-8"></canvas>
    </div>

    <!-- Page 3: 全澳概率 -->
    <div id="page2" class="p-6 hidden">
      <h2 class="text-xl font-semibold mb-6">全澳概率統計</h2>
      <div id="totalSamples" class="bg-white rounded-3xl p-5 text-center mb-6 font-medium"></div>
      <div id="probTable" class="bg-white rounded-3xl overflow-hidden"></div>
      <canvas id="probChart" class="mt-8"></canvas>
      <div id="noDataTip" class="hidden text-center text-slate-400 py-12">尚無數據，請先上傳</div>
    </div>
  </div>

  <script>
    // ========== 你的真實 firebaseConfig（已嵌入）==========
    const firebaseConfig = {
      apiKey: "AIzaSyDoTWA37Rhc3Fre-Y6uSOZIgfBLh9iDin4",
      authDomain: "macau-rewards-2026.firebaseapp.com",
      projectId: "macau-rewards-2026",
      storageBucket: "macau-rewards-2026.firebasestorage.app",
      messagingSenderId: "337797826758",
      appId: "1:337797826758:web:b5d549ce1e25846664afc7",
      measurementId: "G-CGXYLVL6SS"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CSV_URL = "https://docs.google.com/spreadsheets/d/1RkTNjEyGSry_IL0jC344dBqoXOZoLH7aCWaVeWym3Fk/export?format=csv&gid=0";
    const UPLOAD_URL = "https://script.google.com/macros/s/AKfycbxP2Acck5jB6Kd6DKhI5cGtaL-fHlDqK_nYKhMOHAaWvo0ZxuQ4RlBX6vRV3OQ4QL8LBw/exec";

    let currentUser = null;
    let personalRecords = [];
    let crowdData = [];

    const dates = ["2026-04-10 第1週 周五","2026-04-11 第1週 周六","2026-04-12 第1週 周日","2026-04-17 第2週 周五","2026-04-18 第2週 周六","2026-04-19 第2週 周日","2026-04-24 第3週 周五","2026-04-25 第3週 周六","2026-04-26 第3週 周日","2026-05-01 第4週 周五","2026-05-02 第4週 周六","2026-05-03 第4週 周日","2026-05-08 第5週 周五","2026-05-09 第5週 周六","2026-05-10 第5週 周日","2026-05-15 第6週 周五","2026-05-16 第6週 周六","2026-05-17 第6週 周日","2026-05-22 第7週 周五","2026-05-23 第7週 周六","2026-05-24 第7週 周日","2026-05-29 第8週 周五","2026-05-30 第8週 周六","2026-05-31 第8週 周日","2026-06-05 第9週 周五","2026-06-06 第9週 周六","2026-06-07 第9週 周日","2026-06-12 第10週 周五","2026-06-13 第10週 周六","2026-06-14 第10週 周日"];
    const payments = ["MPay澳門錢包","支付寶（澳門）","澳門中銀手機銀行","工銀e支付","豐付寶","廣發移動支付錢包","LusoPay","極易付澳門錢包/UePay"];
    const prizes = [0,10,20,50,100,200];

    let verifier;

    function init() {
      // 原有下拉選單與面額按鈕初始化（完全保留）
      const ds = document.getElementById('dateSelect');
      dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; ds.appendChild(o); });
      
      const ps = document.getElementById('paymentSelect');
      payments.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; ps.appendChild(o); });

      const po = document.getElementById('prizeOptions');
      prizes.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'border border-slate-300 hover:border-slate-500 rounded-2xl py-6 text-xl font-medium transition-all active:scale-95';
        btn.textContent = p + '元';
        btn.onclick = () => btn.classList.toggle('border-sky-500');
        po.appendChild(btn);
      });

      loadCrowdData();
      switchTab(0);

      // 監聽登入狀態
      auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) loadPersonalRecords();
      });
    }

    async function loadCrowdData() {
      Papa.parse(CSV_URL, {download: true, header: true, complete: (res) => {
        crowdData = res.data.filter(r => r.抽獎日期);
        renderCrowdProbability();
      }});
    }

    // ========== 雲端登入流程 ==========
async function sendVerificationCode() {
  const input = document.getElementById('phoneInput').value.trim();
  
  // 只允許8位數字
  if (!/^\d{8}$/.test(input)) {
    return alert('請輸入完整的8位澳門電話號碼（例如：65341234）');
  }
  
  const phone = '+853' + input;
  
  // 先清理舊 reCAPTCHA
  if (verifier) {
    verifier.clear();
    verifier = null;
  }

  verifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    size: 'invisible'
  });

  try {
    const confirmationResult = await auth.signInWithPhoneNumber(phone, verifier);
    window.confirmationResult = confirmationResult;
    document.getElementById('phoneStep').classList.add('hidden');
    document.getElementById('codeStep').classList.remove('hidden');
  } catch (e) {
    alert('發送失敗：' + e.message + '\n\n請確認電話號碼正確，並檢查網路');
  }
}

    async function verifyCode() {
      const code = document.getElementById('codeInput').value;
      try {
        await window.confirmationResult.confirm(code);
        alert('✅ 登入成功！資料已雲端同步');
        closeModal();
      } catch (e) { alert('驗證失敗，請重試'); }
    }

    function closeModal() {
      document.getElementById('loginModal').classList.add('hidden');
    }

    // ========== 雲端儲存 ==========
    async function saveToMyAccount() {
      if (!currentUser) {
        document.getElementById('loginModal').classList.remove('hidden');
        return;
      }
      const date = document.getElementById('dateSelect').value;
      const payment = document.getElementById('paymentSelect').value;
      const selected = Array.from(document.querySelectorAll('#prizeOptions button.border-sky-500')).map(b => parseInt(b.textContent));
      if (selected.length === 0) return alert('請至少選擇一個面額');

      try {
        for (let prize of selected) {
          await db.collection('personalRecords').add({
            uid: currentUser.uid,
            date, payment, prize,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
        await loadPersonalRecords();
        alert('✅ 已儲存到我的帳戶（雲端同步）');
      } catch (e) { alert('儲存失敗：' + e.message); }
    }

    async function loadPersonalRecords() {
      if (!currentUser) return;
      const snapshot = await db.collection('personalRecords').where('uid', '==', currentUser.uid).get();
      personalRecords = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
      renderMyStats();
    }

    async function deleteRecord(recordId) {
      if (!confirm('確認刪除這筆記錄？')) return;
      await db.collection('personalRecords').doc(recordId).delete();
      await loadPersonalRecords();
    }

    // ========== KPI 計算與每週提醒 ==========
    function calculateKPIs(records) {
      if (!records.length) return {total: 0, totalPrize: 0, winRate: 0, avg: 0};
      const total = records.length;
      const totalPrize = records.reduce((sum, r) => sum + r.prize, 0);
      const nonZero = records.filter(r => r.prize > 0).length;
      return {
        total,
        totalPrize,
        winRate: ((nonZero / total) * 100).toFixed(1),
        avg: (totalPrize / total).toFixed(1)
      };
    }

    function getWeeklyUsage() {
      const currentWeek = Math.ceil((new Date() - new Date('2026-04-10')) / (7 * 86400000)) || 1;
      return personalRecords.filter(r => r.date.includes(`第${currentWeek}週`)).length;
    }

    function renderMyStats() {
      const container = document.getElementById('myStats');
      const kpis = calculateKPIs(personalRecords);
      const weekly = getWeeklyUsage();

      container.innerHTML = `
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-sky-600">${kpis.total}</div><div class="text-xs text-slate-500">總抽獎次數</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-emerald-600">$${kpis.totalPrize}</div><div class="text-xs text-slate-500">總中獎金額</div></div>
        <div class="bg-white rounded-3xl p-5 text-center"><div class="text-4xl font-bold text-amber-600">${kpis.winRate}%</div><div class="text-xs text-slate-500">整體中獎率</div></div>
      `;

      // 記錄列表（可刪除）
      let html = `<div class="mt-8 bg-white rounded-3xl overflow-hidden"><table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-3">日期</th><th class="p-3">支付</th><th class="p-3">面額</th><th class="p-3"></th></tr></thead><tbody>`;
      personalRecords.forEach(r => {
        html += `<tr class="border-b"><td class="p-3">${r.date}</td><td class="p-3">${r.payment}</td><td class="p-3 font-medium">${r.prize}元</td><td class="p-3"><button onclick="deleteRecord('${r.id}')" class="text-red-500 text-xs">刪除</button></td></tr>`;
      });
      html += `</tbody></table></div>`;
      container.innerHTML += html;

      if (weekly >= 20) alert(`⚠️ 本週已使用 ${weekly} 次（官方上限 24 次），請留意規則！`);

      // 面額分佈圖
      new Chart(document.getElementById('myChart'), {
        type: 'bar',
        data: {
          labels: prizes,
          datasets: [{ label: '面額分佈', data: prizes.map(p => personalRecords.filter(r => r.prize === p).length), backgroundColor: '#0ea5e9' }]
        },
        options: { scales: { y: { beginAtZero: true } } }
      });
    }

    // ========== 全澳概率（加強版） ==========
    function renderCrowdProbability() {
      const sampleDiv = document.getElementById('totalSamples');
      const tableDiv = document.getElementById('probTable');
      const tip = document.getElementById('noDataTip');

      if (crowdData.length === 0) { tip.classList.remove('hidden'); return; }

      const kpis = calculateKPIs(crowdData);
      const twoHundredRate = ((crowdData.filter(r => parseInt(r.抽獎面額) === 200).length / crowdData.length * 100) || 0).toFixed(2);

      sampleDiv.innerHTML = `全澳總樣本數：${crowdData.length} 筆<br>
        <span class="text-emerald-600 font-medium">整體中獎率 ${kpis.winRate}% • 期望值 $${kpis.avg}元 • 200元大獎率 ${twoHundredRate}%</span>`;

      // 原有表格保持 + 加強
      let html = `<table class="w-full text-sm"><thead><tr class="bg-slate-100"><th class="p-3">週數</th><th class="p-3">總次數</th>`;
      prizes.forEach(p => html += `<th class="p-3">${p}元 (%)</th>`);
      html += `</tr></thead><tbody>`;

      for (let w = 1; w <= 10; w++) {
        const weekData = crowdData.filter(r => r.抽獎日期.includes(`第${w}週`));
        if (weekData.length === 0) continue;
        const total = weekData.length;
        let row = `<tr class="border-b"><td class="p-3 font-medium">第${w}週</td><td class="p-3 text-center">${total}</td>`;
        prizes.forEach(p => {
          const count = weekData.filter(r => parseInt(r.抽獎面額) === p).length;
          const percent = (count / total * 100).toFixed(1);
          row += `<td class="p-3 text-center">${count} <span class="text-xs text-slate-400">(${percent}%)</span></td>`;
        });
        html += row + '</tr>';
      }
      html += '</tbody></table>';
      tableDiv.innerHTML = html;
    }

    async function uploadToSheet() {
      // 原有上傳邏輯保持不變
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true; btn.textContent = '上傳中...';
      const date = document.getElementById('dateSelect').value;
      const payment = document.getElementById('paymentSelect').value;
      const selected = Array.from(document.querySelectorAll('#prizeOptions button.border-sky-500')).map(b => parseInt(b.textContent));
      if (selected.length === 0) { alert('請至少選擇一個面額'); btn.disabled = false; btn.textContent = '☁️ 上傳到全澳統計'; return; }

      try {
        const promises = selected.map(prize => fetch(UPLOAD_URL, {method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({date, payment, prize})}));
        await Promise.all(promises);
        alert('✅ 上傳請求已送出！請稍後刷新全澳概率');
        loadCrowdData();
      } catch (e) { alert('錯誤：' + e.message); } finally {
        btn.disabled = false; btn.textContent = '☁️ 上傳到全澳統計';
      }
    }

    function switchTab(n) {
      for (let i = 0; i < 3; i++) {
        document.getElementById('page' + i).classList.add('hidden');
        document.getElementById('tab' + i).classList.remove('border-b-2', 'border-sky-600', 'text-sky-600');
      }
      document.getElementById('page' + n).classList.remove('hidden');
      document.getElementById('tab' + n).classList.add('border-b-2', 'border-sky-600', 'text-sky-600');
    }

    window.onload = init;
  </script>
</body>
</html>
