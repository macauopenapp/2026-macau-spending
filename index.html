<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026消費大獎賞 診斷版</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold mb-8">一站式上傳診斷版</h1>

  <div class="space-y-6">
    <div>
      <label class="block text-sm mb-1">抽獎日期</label>
      <select id="date" class="w-full border p-4 rounded-2xl text-lg"></select>
    </div>
    <div>
      <label class="block text-sm mb-1">支付系統</label>
      <select id="payment" class="w-full border p-4 rounded-2xl text-lg"></select>
    </div>
    <div>
      <label class="block text-sm mb-1">面額（可多選）</label>
      <div class="grid grid-cols-3 gap-3" id="prizes"></div>
    </div>
  </div>

  <button onclick="uploadTest()" class="mt-8 w-full bg-emerald-600 text-white py-6 rounded-3xl text-xl font-bold" id="btn">
    ☁️ 測試上傳到 Google Sheet
  </button>

  <div id="result" class="mt-6 p-4 bg-white rounded-2xl text-sm font-mono whitespace-pre-wrap"></div>

  <script>
    const UPLOAD_URL = "https://script.google.com/macros/s/AKfycbxP2Acck5jB6Kd6DKhI5cGtaL-fHlDqK_nYKhMOHAaWvo0ZxuQ4RlBX6vRV3OQ4QL8LBw/exec";

    // 填入選單
    const dates = ["2026-04-10 第1週 周五","2026-04-11 第1週 周六","2026-04-12 第1週 周日","2026-04-17 第2週 周五","2026-04-18 第2週 周六","2026-04-19 第2週 周日","2026-04-24 第3週 周五","2026-04-25 第3週 周六","2026-04-26 第3週 周日","2026-05-01 第4週 周五","2026-05-02 第4週 周六","2026-05-03 第4週 周日","2026-05-08 第5週 周五","2026-05-09 第5週 周六","2026-05-10 第5週 周日","2026-05-15 第6週 周五","2026-05-16 第6週 周六","2026-05-17 第6週 周日","2026-05-22 第7週 周五","2026-05-23 第7週 周六","2026-05-24 第7週 周日","2026-05-29 第8週 周五","2026-05-30 第8週 周六","2026-05-31 第8週 周日","2026-06-05 第9週 周五","2026-06-06 第9週 周六","2026-06-07 第9週 周日","2026-06-12 第10週 周五","2026-06-13 第10週 周六","2026-06-14 第10週 周日"];
    dates.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      document.getElementById('date').appendChild(opt);
    });

    const payments = ["MPay澳門錢包","支付寶（澳門）","澳門中銀手機銀行","工銀e支付","豐付寶","廣發移動支付錢包","LusoPay","極易付澳門錢包/UePay"];
    payments.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p; opt.textContent = p;
      document.getElementById('payment').appendChild(opt);
    });

    const prizeDiv = document.getElementById('prizes');
    [0,10,20,50,100,200].forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'border-2 border-slate-300 hover:border-sky-600 rounded-2xl py-6 text-xl font-bold transition-all';
      btn.textContent = p + '元';
      btn.onclick = () => btn.classList.toggle('border-sky-600');
      prizeDiv.appendChild(btn);
    });

    async function uploadTest() {
      const btn = document.getElementById('btn');
      const resultDiv = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '上傳中...';
      resultDiv.textContent = '正在上傳...';

      const date = document.getElementById('date').value;
      const payment = document.getElementById('payment').value;
      const selected = Array.from(document.querySelectorAll('#prizes button.border-sky-600')).map(b => parseInt(b.textContent));

      if (selected.length === 0) {
        alert('請至少選一個面額');
        btn.disabled = false;
        btn.textContent = '☁️ 測試上傳到 Google Sheet';
        return;
      }

      try {
        const promises = selected.map(prize => 
          fetch(UPLOAD_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ date, payment, prize })
          }).then(r => r.text())
        );

        const responses = await Promise.all(promises);
        console.log('完整回應:', responses);

        resultDiv.textContent = '✅ 上傳完成！\n\n後端回應：\n' + responses.join('\n\n');
        alert('上傳完成！請把下面詳細訊息貼給我（包括 console 裡的任何錯誤）');
      } catch(e) {
        console.error(e);
        resultDiv.textContent = '❌ 錯誤：\n' + e.message + '\n\n請把這個完整錯誤貼給我，我會立即幫你解決';
        alert('錯誤：\n' + e.message + '\n\n請把彈出的完整錯誤文字貼給我');
      } finally {
        btn.disabled = false;
        btn.textContent = '☁️ 測試上傳到 Google Sheet';
      }
    }
  </script>
</body>
</html>
